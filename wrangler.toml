name = "gatecode"
main = "src/index.ts"
compatibility_date = "2026-03-01"

# ── Production (default) ─────────────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "gatecode-db"
database_id = "placeholder-production-db-id"

[[kv_namespaces]]
binding = "SESSIONS"
id = "placeholder-production-kv-id"

[vars]
GITHUB_CLIENT_ID = ""
GITHUB_CLIENT_SECRET = ""
APP_URL = "https://gatecode.sh"
STRIPE_SECRET_KEY = ""
STRIPE_WEBHOOK_SECRET = ""

# ── Staging ──────────────────────────────────────────────────────────

[env.staging]
name = "gatecode-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "gatecode-db-staging"
database_id = "placeholder-staging-db-id"

[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id = "placeholder-staging-kv-id"

[env.staging.vars]
GITHUB_CLIENT_ID = ""
GITHUB_CLIENT_SECRET = ""
APP_URL = "https://staging.gatecode.sh"
STRIPE_SECRET_KEY = ""
STRIPE_WEBHOOK_SECRET = ""
